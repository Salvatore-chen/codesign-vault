name: Sync to Gitee

on:
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -z "$GITEE_TOKEN" ]; then
            echo "::error::GITEE_TOKEN is not configured. See docs/DEVELOPMENT.md"
            exit 1
          fi

          git remote add gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/zhang-yunrui/codesign-vault.git"

          # Tag push checks out detached HEAD; fetch master before pushing branch ref.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            git fetch origin master:refs/heads/master
          fi

          git push gitee refs/heads/master:refs/heads/master
          git push gitee --tags
