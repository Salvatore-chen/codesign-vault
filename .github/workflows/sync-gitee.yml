name: Sync to Gitee

on:
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH
        run: |
          if [ -z "${{ secrets.GITEE_SSH_PRIVATE_KEY }}" ]; then
            echo "::error::GITEE_SSH_PRIVATE_KEY is not configured. See docs/DEVELOPMENT.md"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.GITEE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa,ecdsa,ed25519 gitee.com >> ~/.ssh/known_hosts

      - name: Push to Gitee
        run: |
          git remote add gitee git@gitee.com:zhang-yunrui/codesign-vault.git
          git push gitee refs/heads/master:refs/heads/master
          git push gitee --tags
